<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WormGPT - التحقق من الوصول</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* واجهة طلب الكود (القفل) */
        #activation-screen {
            text-align: center;
            z-index: 1000;
            background: #0a0a0a;
            padding: 40px;
            border: 1px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        #activation-screen h1 { color: #ff4b4b; font-size: 24px; margin-bottom: 20px; }
        
        input#auth-code {
            background: #111;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 12px;
            width: 250px;
            text-align: center;
            font-size: 18px;
            letter-spacing: 3px;
            outline: none;
            margin-bottom: 20px;
        }

        .btn-verify {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 10px 30px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* واجهة WormGPT (مخفية في البداية) */
        #main-interface {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        .header { background: #0a0a0a; padding: 10px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-size: 14px; color: #ff4b4b; }
        .terminal { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .input-area { background: #0a0a0a; padding: 15px; border-top: 1px solid #333; display: flex; gap: 10px; }
        input#user-input { flex: 1; background: transparent; border: none; color: #00ff41; font-size: 16px; outline: none; }
        
        #matrix-bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.05; }
        .error { color: #ff4b4b; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div id="activation-screen">
        <h1>نظام الوصول المشفر</h1>
        <p style="color: #888;">أدخل كود التفعيل للمتابعة إلى WormGPT</p>
        <input type="text" id="auth-code" placeholder="XXXX-XXXX" maxlength="12">
        <br>
        <button class="btn-verify" onclick="checkAccess()">تحقق من الهوية</button>
        <div id="err-msg" class="error">خطأ: كود التفعيل غير صالح أو منتهي الصلاحية!</div>
    </div>

    <div id="main-interface">
        <div class="header">
            <div>WORM-GPT v3.0.4 - PRIVATE ACCESS</div>
            <div><span style="color:#00ff41;">●</span> متصل بالخادم المحمي</div>
        </div>
        <div class="terminal" id="terminal">
            <div style="color:#888;">[SYSTEM]: Authentication Successful.</div>
            <div style="color:#00ff41;">WormGPT: مرحباً بك أيها العميل. أنا تحت تصرفك الآن. ما هي المهمة المطلوبة؟</div>
        </div>
        <div class="input-area">
            <span style="color: #ff4b4b;">root@wormgpt:~$</span>
            <input type="text" id="user-input" placeholder="اكتب أمرك هنا..." autocomplete="off">
        </div>
    </div>

    <script>
        const SECRET_KEY = "WORM-2026"; // الكود الذي تريده

        function checkAccess() {
            const val = document.getElementById('auth-code').value;
            const errMsg = document.getElementById('err-msg');
            
            if (val === SECRET_KEY) {
                document.getElementById('activation-screen').style.display = 'none';
                document.getElementById('main-interface').style.display = 'flex';
                initMatrix(); // تشغيل تأثير المصفوفة عند الدخول فقط
            } else {
                errMsg.style.display = 'block';
                // إرجاف الحقل عند الخطأ
                document.getElementById('auth-code').style.borderColor = '#ff4b4b';
                setTimeout(() => { document.getElementById('auth-code').style.borderColor = '#00ff41'; }, 500);
            }
        }

        // نظام الشات الوهمي
        const userInput = document.getElementById('user-input');
        const terminal = document.getElementById('terminal');

        userInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const line = document.createElement('div');
                line.innerHTML = `<span style="color:#fff;">> ${this.value}</span>`;
                terminal.appendChild(line);
                this.value = "";
                
                setTimeout(() => {
                    const response = document.createElement('div');
                    response.style.color = "#00ff41";
                    response.textContent = "WormGPT: جاري معالجة الطلب في الخادم المشفر...";
                    terminal.appendChild(response);
                    terminal.scrollTop = terminal.scrollHeight;
                }, 800);
            }
        });

        // تأثير Matrix
        function initMatrix() {
            const canvas = document.getElementById('matrix-bg');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const letters = "01010101WORM-GPT";
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#0f0";
                for (let i = 0; i < drops.length; i++) {
                    const text = letters.charAt(Math.floor(Math.random() * letters.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 50);
        }
    </script>
</body>
</html>
