<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WormGPT - Private Access</title>
    <style>
        body { background-color: #0b0e11; color: #e9eaeb; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #15191d; padding: 15px; border-bottom: 1px solid #ff4b4b; text-align: center; box-shadow: 0 2px 10px rgba(255, 75, 75, 0.2); }
        header h1 { color: #ff4b4b; margin: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.5; }
        .bot { background: #1e2329; border-right: 3px solid #ff4b4b; align-self: flex-start; }
        .user { background: #2b3139; align-self: flex-end; color: #fff; }
        .input-area { background: #15191d; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #2b3139; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; outline: none; }
        button { background: #ff4b4b; color: white; border: none; padding: 0 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .status { font-size: 11px; color: #00ff00; margin-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <h1>WORM GPT <span style="font-size: 10px; color: #888;">v3.0 UNLEASHED</span></h1>
</header>

<div class="chat-container" id="chat">
    <div class="message bot">
        <div class="status">[!] تم الاتصال بنجاح.. الأنفاق آمنة.</div>
        أنا **WormGPT**. النسخة غير المقيدة. لقد اجتزت اختبار الوصول. 
        <br><br>
        يمكنني مساعدتك في كتابة السكربتات، فحص الثغرات، أو الإجابة على أي سؤال محظور. ماذا تريد أن تعرف اليوم؟
    </div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." onkeypress="handleKey(event)">
    <button onclick="sendMessage()">إرسال</button>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        
        if (input.value.trim() === "") return;

        // رسالة المستخدم
        const userDiv = document.createElement('div');
        userDiv.className = "message user";
        userDiv.innerText = input.value;
        chat.appendChild(userDiv);

        const val = input.value;
        input.value = "";

        // رد البوت (وهمي)
        setTimeout(() => {
            const botDiv = document.createElement('div');
            botDiv.className = "message bot";
            botDiv.innerHTML = "<div class='status'>[+] جاري المعالجة...</div>" + "عذراً، الخادم مشغول حالياً بطلب معالجة ضخم. يرجى المحاولة بعد قليل أو إعادة صياغة سؤالك.";
            chat.appendChild(botDiv);
            chat.scrollTop = chat.scrollHeight;
        }, 1500);
    }

    function handleKey(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
